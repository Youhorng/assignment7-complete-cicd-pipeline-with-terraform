name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  gitleaks:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: Code quality (SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-fs:
    name: Filesystem vuln scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  tf-validate:
    name: Terraform fmt/validate/tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform fmt -check
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform validate
      - uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build-image:
    name: Build & push Docker image
    needs: [gitleaks, trivy-fs, tf-validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image refs
        id: img
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${OWNER_LC}/feane" >> $GITHUB_OUTPUT
          echo "sha_ref=ghcr.io/${OWNER_LC}/feane:sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "latest_ref=ghcr.io/${OWNER_LC}/feane:latest" >> $GITHUB_OUTPUT

      # Plain docker build into the runner's local daemon so Trivy can scan
      # the image BEFORE we push it to ghcr.io (scan-then-promote pattern).
      - name: Build image locally
        run: |
          docker build \
            -t ${{ steps.img.outputs.sha_ref }} \
            -t ${{ steps.img.outputs.latest_ref }} \
            .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.img.outputs.sha_ref }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to ghcr.io
        run: |
          docker push ${{ steps.img.outputs.sha_ref }}
          docker push ${{ steps.img.outputs.latest_ref }}
